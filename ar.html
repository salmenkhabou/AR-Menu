<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no, maximum-scale=1.0">
    <title>AR View - Smart Menu</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body { 
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
            overflow: hidden; 
            background: #000;
        }
        
        .back-button {
            position: fixed;
            top: 20px;
            left: 20px;
            z-index: 1000;
            padding: 12px 20px;
            font-size: 1rem;
            font-weight: 600;
            color: #fff;
            background: rgba(0, 0, 0, 0.7);
            border: 1px solid rgba(255, 255, 255, 0.2);
            border-radius: 25px;
            cursor: pointer;
            text-decoration: none;
        }
        
        #ar-ui {
            position: fixed;
            bottom: 0;
            left: 0;
            right: 0;
            z-index: 999;
            pointer-events: none;
        }
        
        .scanning {
            position: fixed;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
            text-align: center;
            color: #fff;
        }
        
        .scanning.hidden { display: none; }
        
        .scan-animation {
            width: 200px;
            height: 200px;
            border: 3px solid transparent;
            border-top-color: #f39c12;
            border-right-color: #f39c12;
            border-radius: 50%;
            margin: 0 auto 20px;
            animation: scan-rotate 2s linear infinite;
        }
        
        @keyframes scan-rotate {
            0% { transform: rotate(0deg); }
            100% { transform: rotate(360deg); }
        }
        
        .dish-info {
            background: linear-gradient(to top, rgba(0, 0, 0, 0.9) 0%, rgba(0, 0, 0, 0) 100%);
            padding: 40px 20px 30px;
            text-align: center;
            color: #fff;
        }
        
        .dish-info.hidden { display: none; }
        .dish-info h3 { font-size: 1.5rem; margin-bottom: 8px; }
        .dish-info p { color: #ccc; font-size: 0.95rem; margin-bottom: 10px; }
        .dish-info .price { color: #f39c12; font-size: 1.3rem; font-weight: 700; }
        
        .a-enter-vr-button, .a-enter-ar-button { display: none !important; }
    </style>
    <script src="https://aframe.io/releases/1.4.2/aframe.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/mind-ar@1.2.5/dist/mindar-image-aframe.prod.js"></script>
</head>
<body>
    <a href="index.html" class="back-button">← Back to Menu</a>
    
    <a-scene
        mindar-image="imageTargetSrc: ./targets/targets.mind; autoStart: true; uiLoading: yes; uiError: yes; uiScanning: no;"
        color-space="sRGB"
        renderer="colorManagement: true; physicallyCorrectLights: true;"
        vr-mode-ui="enabled: false"
        device-orientation-permission-ui="enabled: false"
    >
        <a-assets timeout="60000">
            <a-asset-item id="burger-model" src="./models/burger.glb"></a-asset-item>
            <a-asset-item id="pizza-model" src="./models/pizza.glb"></a-asset-item>
            <a-asset-item id="salad-model" src="./models/salad.glb"></a-asset-item>
            <a-asset-item id="pasta-model" src="./models/pasta.glb"></a-asset-item>
            <a-asset-item id="steak-model" src="./models/steak.glb"></a-asset-item>
            <a-asset-item id="dessert-model" src="./models/desserts.glb"></a-asset-item>
            <a-asset-item id="bruschetta-model" src="./models/day_71_-_1_scan_a_day_-_bruschetta.glb"></a-asset-item>
            <a-asset-item id="soup-model" src="./models/low_poly_vegetable_soup.glb"></a-asset-item>
            <a-asset-item id="calamari-model" src="./models/the_grove_of_hobe_sound_-_app_-_calamari.glb"></a-asset-item>
            <a-asset-item id="salmon-model" src="./models/grilled_salmon_fish-poly.glb"></a-asset-item>
            <a-asset-item id="chicken-model" src="./models/roasted_chicken.glb"></a-asset-item>
            <a-asset-item id="risotto-model" src="./models/bario_black_rice_bowl_scaniverse_lidar.glb"></a-asset-item>
            <a-asset-item id="lasagna-model" src="./models/lasagna.glb"></a-asset-item>
            <a-asset-item id="tiramisu-model" src="./models/tiramisu.glb"></a-asset-item>
            <a-asset-item id="cheesecake-model" src="./models/cheesecake.glb"></a-asset-item>
            <a-asset-item id="gelato-model" src="./models/gelato.glb"></a-asset-item>
            <a-asset-item id="coffee-model" src="./models/caffe_latte_espresso_bitter.glb"></a-asset-item>
            <a-asset-item id="latte-model" src="./models/caffe_latte_cup.glb"></a-asset-item>
            <a-asset-item id="cocktail-model" src="./models/cocktail_martini.glb"></a-asset-item>
            <a-asset-item id="lemonade-model" src="./models/homemade_lemonade.glb"></a-asset-item>
        </a-assets>

        <a-camera position="0 0 0" look-controls="enabled: false"></a-camera>

        <!-- AR Target 0: Shows selected dish -->
        <a-entity mindar-image-target="targetIndex: 0">
            <a-gltf-model
                id="dish-model"
                position="0 0.05 0"
                scale="0.05 0.05 0.05"
                rotation="0 0 0"
                animation="property: rotation; to: 0 360 0; loop: true; dur: 8000; easing: linear"
            ></a-gltf-model>
        </a-entity>
    </a-scene>

    <div id="ar-ui">
        <div id="scanning-indicator" class="scanning">
            <div class="scan-animation"></div>
            <p>Point camera at the menu marker</p>
        </div>
        
        <div id="dish-info" class="dish-info hidden">
            <h3 id="dish-name">Dish Name</h3>
            <p id="dish-description">Description</p>
            <p id="dish-price" class="price">$0.00</p>
        </div>
    </div>

    <script>
        // Dish data - ADJUST SCALE VALUES HERE
        const dishes = {
            // STARTERS
            bruschetta: {
                name: 'Bruschetta',
                description: 'Toasted bread with fresh tomatoes, basil, and garlic',
                price: '$8.99',
                model: '#bruschetta-model',
                scale: '0.05 0.05 0.05'
            },
            soup: {
                name: 'Soup of the Day',
                description: 'Chef\'s daily creation with artisan bread',
                price: '$7.99',
                model: '#soup-model',
                scale: '0.08 0.08 0.08'
            },
            salad: {
                name: 'Garden Salad',
                description: 'Fresh mixed greens with cherry tomatoes, cucumber',
                price: '$9.99',
                model: '#salad-model',
                scale: '0.15 0.15 0.15'
            },
            calamari: {
                name: 'Fried Calamari',
                description: 'Crispy squid rings with marinara sauce',
                price: '$12.99',
                model: '#calamari-model',
                scale: '0.05 0.05 0.05'
            },
            
            // MAIN COURSES
            burger: {
                name: 'Classic Burger',
                description: 'Juicy beef patty with fresh lettuce, tomato, cheese',
                price: '$14.99',
                model: '#burger-model',
                scale: '0.03 0.03 0.03'
            },
            pizza: {
                name: 'Margherita Pizza',
                description: 'Traditional Italian pizza with fresh mozzarella, basil',
                price: '$16.99',
                model: '#pizza-model',
                scale: '0.15 0.15 0.15'
            },
            pasta: {
                name: 'Spaghetti Carbonara',
                description: 'Creamy pasta with crispy bacon, parmesan cheese',
                price: '$15.99',
                model: '#pasta-model',
                scale: '0.08 0.08 0.08'
            },
            steak: {
                name: 'Grilled Ribeye',
                description: 'Premium 12oz ribeye steak with herb butter',
                price: '$32.99',
                model: '#steak-model',
                scale: '0.15 0.15 0.15'
            },
            salmon: {
                name: 'Grilled Salmon',
                description: 'Fresh Atlantic salmon with lemon butter sauce',
                price: '$26.99',
                model: '#salmon-model',
                scale: '0.1 0.1 0.1'
            },
            chicken: {
                name: 'Roasted Chicken',
                description: 'Half chicken with rosemary, garlic, and potatoes',
                price: '$19.99',
                model: '#chicken-model',
                scale: '0.08 0.08 0.08'
            },
            risotto: {
                name: 'Mushroom Risotto',
                description: 'Creamy Arborio rice with wild mushrooms',
                price: '$18.99',
                model: '#risotto-model',
                scale: '0.03 0.03 0.03'
            },
            lasagna: {
                name: 'Beef Lasagna',
                description: 'Layers of pasta, beef ragù, and melted cheese',
                price: '$17.99',
                model: '#lasagna-model',
                scale: '0.08 0.08 0.08'
            },
            
            // DESSERTS
            dessert: {
                name: 'Chocolate Lava Cake',
                description: 'Warm chocolate cake with molten center',
                price: '$9.99',
                model: '#dessert-model',
                scale: '0.12 0.12 0.12'
            },
            tiramisu: {
                name: 'Tiramisu',
                description: 'Espresso-soaked ladyfingers and mascarpone',
                price: '$8.99',
                model: '#tiramisu-model',
                scale: '0.08 0.08 0.08'
            },
            cheesecake: {
                name: 'New York Cheesecake',
                description: 'Creamy cheesecake with berry compote',
                price: '$9.99',
                model: '#cheesecake-model',
                scale: '0.03 0.03 0.03'
            },
            icecream: {
                name: 'Gelato Selection',
                description: 'Three scoops of artisan Italian gelato',
                price: '$7.99',
                model: '#gelato-model',
                scale: '0.03 0.03 0.03'
            },
            
            // DRINKS
            coffee: {
                name: 'Espresso',
                description: 'Rich Italian espresso shot',
                price: '$3.99',
                model: '#coffee-model',
                scale: '0.08 0.08 0.08'
            },
            latte: {
                name: 'Caffè Latte',
                description: 'Espresso with steamed milk',
                price: '$5.99',
                model: '#latte-model',
                scale: '0.15 0.15 0.15'
            },
            wine: {
                name: 'House Wine',
                description: 'Glass of red or white wine',
                price: '$8.99',
                model: '#cocktail-model',
                scale: '0.15 0.15 0.15'
            },
            cocktail: {
                name: 'Signature Cocktail',
                description: 'Today\'s special creation',
                price: '$12.99',
                model: '#cocktail-model',
                scale: '0.15 0.15 0.15'
            },
            lemonade: {
                name: 'Fresh Lemonade',
                description: 'Homemade lemonade with mint',
                price: '$4.99',
                model: '#lemonade-model',
                scale: '0.15 0.15 0.15'
            }
        };

        // Get selected dish from localStorage
        const selectedDishId = localStorage.getItem('selectedDish') || 'burger';
        const dish = dishes[selectedDishId] || dishes.burger;

        // Wait for scene to load, then set the model
        document.querySelector('a-scene').addEventListener('loaded', () => {
            const model = document.getElementById('dish-model');
            model.setAttribute('src', dish.model);
            model.setAttribute('scale', dish.scale);
            
            // Update dish info
            document.getElementById('dish-name').textContent = dish.name;
            document.getElementById('dish-description').textContent = dish.description;
            document.getElementById('dish-price').textContent = dish.price;
        });

        // Handle target found/lost
        const target = document.querySelector('[mindar-image-target]');
        const scanning = document.getElementById('scanning-indicator');
        const dishInfo = document.getElementById('dish-info');
        
        if (target) {
            target.addEventListener('targetFound', () => {
                scanning.classList.add('hidden');
                dishInfo.classList.remove('hidden');
            });
            
            target.addEventListener('targetLost', () => {
                scanning.classList.remove('hidden');
                dishInfo.classList.add('hidden');
            });
        }
    </script>
</body>
</html>
